<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suwit Jawa Arena</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <p class="eyebrow">ionbisa</p>
        <h1>Suwit Jawa</h1>
      </header>

      <section class="container" aria-label="Arena permainan Suwit Jawa">
        <div class="scoreboard">
          <div class="score-box">
            <span class="player-name">Player</span>
            <strong class="score-player">0</strong>
          </div>
          <div class="score-round">
            <span>Ronde</span>
            <strong class="round-number">1/5</strong>
          </div>
          <div class="score-box">
            <span>Computer</span>
            <strong class="score-computer">0</strong>
          </div>
        </div>

        <div class="battlefield">
          <div class="area-komputer">
            <span class="area-label">Computer</span>
            <img
              src="img/gajah.png"
              class="img-komputer"
              alt="Pilihan computer"
            />
          </div>

          <div class="info" aria-live="polite">Pilih jagoanmu</div>

          <div class="area-player">
            <span class="area-label player-name">Player</span>
            <ul class="choices" aria-label="Pilihan player">
              <li>
                <button
                  class="choice-button gajah"
                  type="button"
                  data-choice="gajah"
                >
                  <img src="img/gajah.png" alt="" />
                  <span>Gajah</span>
                </button>
              </li>
              <li>
                <button
                  class="choice-button orang"
                  type="button"
                  data-choice="orang"
                >
                  <img src="img/orang.png" alt="" />
                  <span>Orang</span>
                </button>
              </li>
              <li>
                <button
                  class="choice-button semut"
                  type="button"
                  data-choice="semut"
                >
                  <img src="img/semut.png" alt="" />
                  <span>Semut</span>
                </button>
              </li>
            </ul>
          </div>
        </div>
      </section>
    </main>

    <div class="popup name-popup">
      <div class="popup-box name-popup-box">
        <div class="popup-badge">Player Profile</div>
        <h2 class="popup-title">Siapa nama kamu?</h2>
        <form class="name-form">
          <label class="sr-only" for="playerName">Nama player</label>
          <input
            id="playerName"
            class="name-input"
            name="playerName"
            type="text"
            maxlength="16"
            autocomplete="off"
            placeholder="Masukkan nama"
            required
          />
          <button class="save-name" type="submit">Simpan Nama</button>
        </form>
      </div>
    </div>

    <div class="popup start-popup hidden">
      <div class="popup-box start-popup-box">
        <div class="popup-badge">Suwit Jawa</div>
        <h2 class="popup-title">Siap Bermain?</h2>
        <p class="popup-message">Mainkan 5 ronde dan rebut skor tertinggi.</p>
        <button class="start-game" type="button">Mulai Bermain</button>
      </div>
    </div>

    <div class="popup game-popup hidden">
      <div class="popup-box">
        <div class="popup-badge">Game Over</div>
        <h2 class="popup-title">Player Menang!</h2>
        <p class="popup-message">Skor akhir 0 - 0</p>
        <button class="play-again" type="button">Main Lagi</button>
      </div>
    </div>

    <script src="main_2.js"></script>
  </body>
</html>
